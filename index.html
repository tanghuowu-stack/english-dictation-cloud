<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家庭英语单词听写</title>
  <style>
    :root {
      --content-width: 1080px;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --brand: #2364aa;
      --brand-dark: #174d86;
      --ok: #13795b;
      --warn: #ad6a00;
      --danger: #b42318;
      --soft: #eef4fb;
      --radius: 8px;
      --shadow: 0 1px 2px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h1 { font-size: 21px; }
    h2 { font-size: 20px; margin-bottom: 12px; }
    h3 { font-size: 16px; margin-bottom: 10px; }

    .library-switcher {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    main {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 16px;
    }

    nav {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 16px 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .nav-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius);
      white-space: nowrap;
      min-height: 42px;
    }

    .nav-btn.active {
      border-color: var(--brand);
      background: var(--soft);
      color: var(--brand-dark);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .row.between { justify-content: space-between; }
    .stack { display: grid; gap: 10px; }
    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .strong { font-weight: 700; }

    button, input, select, textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      min-height: 42px;
      padding: 9px 13px;
      border-radius: var(--radius);
      cursor: pointer;
    }

    button:hover { background: var(--brand-dark); }
    button.secondary {
      background: #fff;
      color: var(--brand);
      border-color: #9bb8d8;
    }

    button.secondary:hover { background: var(--soft); }
    button.danger {
      background: #fff;
      color: var(--danger);
      border-color: #e7aaa5;
    }

    button.danger:hover { background: #fff3f1; }
    button.ghost {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }

    button.ghost:hover { background: #f2f4f7; }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 14px;
      color: var(--text);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
    }

    .checkbox-row input {
      width: 20px;
      min-height: 20px;
      accent-color: var(--brand);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      min-height: 70px;
    }

    .stat .num {
      font-size: 22px;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .notice {
      border: 1px solid #f0c980;
      background: #fff8e8;
      color: #6f4700;
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .success {
      border: 1px solid #8dc7b2;
      background: #eefaf5;
      color: #0d5d45;
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.new { border-color: #95c4e6; color: #175c92; background: #edf7ff; }
    .tag.wrong { border-color: #f0b3ad; color: #9a2218; background: #fff3f1; }
    .tag.review { border-color: #d8ba72; color: #7a5100; background: #fff8e8; }
    .tag.multi { border-color: #a6a9d9; color: #373088; background: #f1f0ff; }
    .tag.ok { border-color: #8dc7b2; color: #0d5d45; background: #eefaf5; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 9px 8px;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #344054;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .table-wrap {
      overflow: auto;
      max-height: 520px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .page-scroll-table {
      max-height: none;
      overflow-x: auto;
      overflow-y: visible;
    }

    .word-cell { min-width: 150px; font-weight: 700; }
    .meaning-cell { min-width: 160px; }
    .actions-cell { min-width: 210px; }

    .player {
      display: grid;
      place-items: center;
      min-height: 260px;
      text-align: center;
      gap: 16px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .progress-big {
      font-size: 34px;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .word-hidden {
      color: var(--muted);
      font-size: 15px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: min(680px, 100%);
      text-align: left;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
    }

    .danger-text { color: var(--danger); }
    .ok-text { color: var(--ok); }
    .warn-text { color: var(--warn); }

    @media (max-width: 820px) {
      .topbar { grid-template-columns: 1fr; }
      .library-switcher { justify-content: flex-start; }
      .span-8, .span-6, .span-4 { grid-column: span 12; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
      nav { padding-bottom: 10px; }
      button { width: auto; min-height: 46px; }
      .row.mobile-full button, .row.mobile-full select, .row.mobile-full input { flex: 1 1 100%; }
    }

    @media (min-width: 821px) and (max-width: 1100px) {
      :root { --content-width: 1000px; }
      main { padding: 12px; }
      .topbar { padding: 10px 12px; }
      nav { padding-left: 12px; padding-right: 12px; }
      .card { padding: 12px; }
      .stat { min-height: 64px; padding: 9px; }
      .stat .num { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>家庭英语单词听写</h1>
        <div class="small muted">长期可复用，多词库，本地保存</div>
      </div>
      <div class="library-switcher">
        <span class="small muted">当前词库</span>
        <select id="librarySelect" aria-label="切换词库"></select>
      </div>
    </div>
    <nav id="mainNav"></nav>
  </header>

  <main id="app"></main>

  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script type="module" src="./src/cloudSyncUi.js"></script>
  <script>
    const STORAGE_KEY = "family_english_dictation_v1";
    const APP_VERSION = "1.0.0";
    const SOURCE_LABELS = {
      new: "新词",
      wrong: "错词复习",
      review: "到期错词复查",
      multi: "多重来源"
    };
    const RECOMMENDED_VOICE_PRESETS = [
      {
        id: "google-us",
        label: "美音",
        lang: "en-US",
        names: ["Google US English"],
        fallback: "日常单词听写，清楚稳定"
      },
      {
        id: "google-uk-female",
        label: "英音",
        lang: "en-GB",
        names: ["Google UK English Female"],
        fallback: "英音环境，适合 Cambridge/FCE"
      }
    ];
    const DEFAULT_SETTINGS = {
      earlyPhaseDays: 15,
      earlyNewWordsPerDay: 30,
      laterNewWordsPerDay: 20,
      reviewDelayDays: 15,
      dailyTargetWords: 30,
      dailyReviewWords: 30,
      dailyMaxWords: 60,
      countMode: "split-new-review",
      pauseNewWords: false,
      playOrder: "ordered",
      autoPlayIntervalSeconds: 5,
      autoPlayRepeatTimes: 1,
      speechRate: 0.9,
      speechVoiceName: "",
      showAnswerEnglish: false,
      showAnswerMeaning: false,
      correctTimesToExitWrongPool: 1
    };

    let data = null;
    let viewName = "today";
    let dictationIndex = 0;
    let autoTimer = null;
    let todaySummary = null;
    let manualStrictTask = null;
    let manualBatchSession = null;
    let editingRecordDay = null;
    let availableSpeechVoices = [];

    function uid(prefix) {
      return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function todayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeWord(word) {
      return String(word || "").trim().toLowerCase();
    }

    function normalizeMeaning(meaning) {
      return String(meaning || "").trim().replace(/\s+/g, " ");
    }

    function normalizeWordForDuplicate(word) {
      return String(word || "").trim();
    }

    function getWordDuplicateKey(word, meaning) {
      return normalizeWordForDuplicate(word) + "\u0001" + normalizeMeaning(meaning);
    }

    function simpleHash(text) {
      let hash = 5381;
      for (let i = 0; i < text.length; i += 1) {
        hash = ((hash << 5) + hash) + text.charCodeAt(i);
        hash = hash >>> 0;
      }
      return hash.toString(36);
    }

    function generateWordId(rawWord, meaning, usedIds) {
      const base = normalizeWord(rawWord).replace(/[^a-z0-9_-]+/g, "_") || "word";
      let candidate = base;
      if (!usedIds.has(candidate)) return candidate;
      candidate = base + "__" + simpleHash(getWordDuplicateKey(rawWord, meaning));
      let suffix = 2;
      while (usedIds.has(candidate)) {
        candidate = base + "__" + simpleHash(getWordDuplicateKey(rawWord, meaning)) + "_" + suffix;
        suffix += 1;
      }
      return candidate;
    }

    function makeWord(rawWord, meaning, index) {
      const normalized = normalizeWord(rawWord);
      return {
        id: normalized || uid("word"),
        word: String(rawWord || "").trim(),
        meaning: String(meaning || "").trim(),
        index,
        originalNo: index + 1,
        firstLearnDay: null,
        delayedReviewDay: null,
        delayedReviewCompleted: false,
        delayedReviewPostponed: false,
        wrongReviewDueDay: null,
        wrongReviewStage: 0,
        wrongReviewCompletedCount: 0,
        lastExitedWrongPoolDay: null,
        wrongCount: 0,
        lastWrongDay: null,
        lastWrongDate: null,
        isPendingWrong: false,
        correctStreakInWrongPool: 0,
        isFocus: false,
        isStubborn: false,
        manualFocus: null,
        manualStubborn: null
      };
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          data = JSON.parse(raw);
        } catch (error) {
          alert("本地数据读取失败，将创建一个新的空数据。旧数据仍保留在浏览器存储中。");
          data = null;
        }
      }
      if (!data || !Array.isArray(data.libraries)) {
        data = {
          version: APP_VERSION,
          activeLibraryId: null,
          libraries: []
        };
        createLibrary("我的词库", false);
      }
      data.version = data.version || APP_VERSION;
      data.libraries.forEach(lib => {
        migrateLibrary(lib);
        migrateWrongReviewRule(lib, { preserveDraft: true });
      });
      if (!data.activeLibraryId && data.libraries[0]) data.activeLibraryId = data.libraries[0].libraryId;
      saveData();
    }

    function saveData() {
      if (!data) return;
      data.version = APP_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function migrateLibrary(lib) {
      lib.libraryId = lib.libraryId || uid("lib");
      lib.libraryName = lib.libraryName || "未命名词库";
      lib.createdAt = lib.createdAt || todayDate();
      lib.updatedAt = lib.updatedAt || todayDate();
      const existingSettings = lib.settings || {};
      const shouldMigrateSplitCount = existingSettings.dailyReviewWords == null && existingSettings.countMode !== "split-new-review";
      lib.settings = Object.assign({}, DEFAULT_SETTINGS, existingSettings);
      if (shouldMigrateSplitCount) {
        lib.settings.dailyTargetWords = 30;
        lib.settings.dailyReviewWords = 30;
        lib.settings.countMode = "split-new-review";
      } else {
        lib.settings.dailyTargetWords = clampNumber(lib.settings.dailyTargetWords, 0, 100, 30);
        lib.settings.dailyReviewWords = clampNumber(lib.settings.dailyReviewWords, 0, 100, 30);
        lib.settings.countMode = "split-new-review";
      }
      lib.words = Array.isArray(lib.words) ? lib.words : [];
      lib.dailyRecords = Array.isArray(lib.dailyRecords) ? lib.dailyRecords : [];
      lib.currentDraftTask = lib.currentDraftTask || null;
      lib.words.forEach((word, index) => {
        const normalized = normalizeWord(word.word || word.id);
        word.id = word.id || normalized || uid("word");
        word.word = word.word || word.id;
        word.meaning = word.meaning || "";
        word.index = Number.isFinite(word.index) ? word.index : index;
        if (word.originalNo == null) word.originalNo = getWordOriginalNo(word, index);
        word.firstLearnDay = word.firstLearnDay ?? null;
        word.delayedReviewDay = word.delayedReviewDay ?? null;
        word.delayedReviewCompleted = Boolean(word.delayedReviewCompleted);
        word.delayedReviewPostponed = Boolean(word.delayedReviewPostponed);
        word.wrongReviewDueDay = word.wrongReviewDueDay ?? word.delayedReviewDay ?? null;
        word.wrongReviewStage = Number(word.wrongReviewStage || 0);
        word.wrongReviewCompletedCount = Number(word.wrongReviewCompletedCount || 0);
        word.lastExitedWrongPoolDay = word.lastExitedWrongPoolDay ?? null;
        word.wrongCount = Number(word.wrongCount || 0);
        word.lastWrongDay = word.lastWrongDay ?? null;
        word.lastWrongDate = word.lastWrongDate ?? null;
        word.isPendingWrong = Boolean(word.isPendingWrong);
        word.correctStreakInWrongPool = Number(word.correctStreakInWrongPool || 0);
        word.manualFocus = word.manualFocus ?? null;
        word.manualStubborn = word.manualStubborn ?? null;
        applyWrongFlags(word);
      });
      lib.words.sort((a, b) => a.index - b.index);
      ensureOriginalNos(lib);
    }

    function migrateWrongReviewRule(lib, options = {}) {
      const needsWrongReviewMigration = lib.reviewRuleVersion !== "wrong-only-review-v1";
      if (needsWrongReviewMigration && lib.dailyRecords.length) {
        recalculateLibraryState(lib, { preserveDraft: options.preserveDraft !== false, silent: true });
      }
      lib.reviewRuleVersion = "wrong-only-review-v1";
    }

    function ensureOriginalNos(lib) {
      if (!lib || !Array.isArray(lib.words)) return;
      lib.words.forEach((word, index) => {
        if (word.originalNo == null) {
          word.originalNo = getWordOriginalNo(word, index);
        }
      });
    }

    function getWordOriginalNo(word, fallbackIndex = 0) {
      const value = Number(word?.originalNo ?? word?.originalIndex ?? word?.importIndex ?? word?.order);
      return Number.isFinite(value) && value > 0 ? value : fallbackIndex + 1;
    }

    function getNextOriginalNo(lib) {
      const max = Math.max(0, ...lib.words.map((word, index) => getWordOriginalNo(word, index)));
      return max + 1;
    }

    function uniqueWordIds(ids) {
      return Array.from(new Set((ids || []).filter(Boolean)));
    }

    function createLibrary(name, shouldRender = true) {
      const lib = {
        libraryId: uid("lib"),
        libraryName: String(name || "新词库").trim() || "新词库",
        createdAt: todayDate(),
        updatedAt: todayDate(),
        settings: Object.assign({}, DEFAULT_SETTINGS),
        words: [],
        dailyRecords: [],
        currentDraftTask: null
      };
      if (!data) {
        data = { version: APP_VERSION, activeLibraryId: lib.libraryId, libraries: [] };
      }
      data.libraries.push(lib);
      data.activeLibraryId = lib.libraryId;
      saveData();
      if (shouldRender) renderApp();
      return lib;
    }

    function switchLibrary(libraryId) {
      stopAutoPlay();
      if (data.libraries.some(lib => lib.libraryId === libraryId)) {
        data.activeLibraryId = libraryId;
        dictationIndex = 0;
        todaySummary = null;
        manualStrictTask = null;
        saveData();
        renderApp();
      }
    }

    function deleteLibrary(libraryId) {
      const lib = data.libraries.find(item => item.libraryId === libraryId);
      if (!lib) return;
      const first = confirm("确定要删除词库“" + lib.libraryName + "”吗？这个操作不能撤销。");
      if (!first) return;
      const second = confirm("请再次确认：删除后该词库的单词、进度和错词记录都会消失。");
      if (!second) return;
      data.libraries = data.libraries.filter(item => item.libraryId !== libraryId);
      if (!data.libraries.length) createLibrary("我的词库", false);
      data.activeLibraryId = data.libraries[0].libraryId;
      saveData();
      renderApp();
    }

    function updateLibrarySettings(partial) {
      const lib = getCurrentLibrary();
      if (!lib) return;
      lib.settings = Object.assign({}, lib.settings, partial);
      lib.updatedAt = todayDate();
      saveData();
      renderApp();
    }

    function getCurrentLibrary() {
      if (!data || !Array.isArray(data.libraries)) return null;
      return data.libraries.find(lib => lib.libraryId === data.activeLibraryId) || data.libraries[0] || null;
    }

    function getWordById(lib, id) {
      return lib.words.find(word => word.id === id);
    }

    function findWordByImportedItem(lib, item) {
      const importedWord = normalizeWordForDuplicate(item.word);
      const candidates = lib.words.filter(word => normalizeWordForDuplicate(word.word) === importedWord);
      if (!candidates.length) return null;
      const meaning = normalizeMeaning(item.meaning);
      if (meaning) {
        return candidates.find(word => normalizeMeaning(word.meaning) === meaning) || null;
      }
      return candidates[0];
    }

    function parseWordList(text) {
      const rows = String(text || "").split(/\r?\n/);
      const result = [];
      rows.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        let word = trimmed;
        let meaning = "";
        const firstChineseIndex = trimmed.search(/[\u3400-\u9fff]/);
        if (firstChineseIndex >= 0) {
          word = trimmed.slice(0, firstChineseIndex).trim().replace(/[|\t]+$/, "").trim();
          meaning = trimmed.slice(firstChineseIndex).trim();
        } else if (trimmed.includes("|")) {
          const parts = trimmed.split("|");
          word = parts.shift().trim();
          meaning = parts.join("|").trim();
        } else if (trimmed.includes("\t")) {
          const parts = trimmed.split("\t");
          word = parts.shift().trim();
          meaning = parts.join("\t").trim();
        }
        if (word) result.push({ word, meaning });
      });
      return result;
    }

    function importWordsToLibrary(lib, text, mode = "append") {
      const parsed = parseWordList(text);
      if (!parsed.length) return { added: 0, skipped: 0 };
      if (mode === "replace") {
        lib.words = [];
        lib.dailyRecords = [];
        lib.currentDraftTask = null;
      }
      const existing = new Set(lib.words.map(word => getWordDuplicateKey(word.word, word.meaning)));
      const usedIds = new Set(lib.words.map(word => word.id));
      let nextOriginalNo = getNextOriginalNo(lib);
      let added = 0;
      let skipped = 0;
      parsed.forEach(item => {
        const normalized = normalizeWordForDuplicate(item.word);
        const duplicateKey = getWordDuplicateKey(item.word, item.meaning);
        if (!normalized || existing.has(duplicateKey)) {
          skipped += 1;
          return;
        }
        const word = makeWord(item.word, item.meaning, lib.words.length);
        word.id = generateWordId(item.word, item.meaning, usedIds);
        word.originalNo = nextOriginalNo;
        nextOriginalNo += 1;
        lib.words.push(word);
        existing.add(duplicateKey);
        usedIds.add(word.id);
        added += 1;
      });
      lib.updatedAt = todayDate();
      saveData();
      return { added, skipped };
    }

    function repairSplitPhraseMeanings(lib) {
      let repaired = 0;
      let skipped = 0;
      lib.words.forEach(word => {
        const match = String(word.meaning || "").trim().match(/^([A-Za-z][A-Za-z0-9'’&/().-]*(?:\s+[A-Za-z][A-Za-z0-9'’&/().-]*)*)\s+([\u3400-\u9fff].*)$/);
        if (!match) return;
        const nextWord = (word.word + " " + match[1]).trim().replace(/\s+/g, " ");
        const nextMeaning = match[2].trim();
        const duplicate = lib.words.some(other => {
          return other.id !== word.id && getWordDuplicateKey(other.word, other.meaning) === getWordDuplicateKey(nextWord, nextMeaning);
        });
        if (duplicate) {
          skipped += 1;
          return;
        }
        word.word = nextWord;
        word.meaning = nextMeaning;
        repaired += 1;
      });
      if (repaired) {
        lib.updatedAt = todayDate();
        saveData();
      }
      return { repaired, skipped };
    }

    function getNextDayNumber(lib = getCurrentLibrary()) {
      if (!lib || !lib.dailyRecords.length) return 1;
      return Math.max(...lib.dailyRecords.map(record => Number(record.dayNumber || 0))) + 1;
    }

    function getPlannedNewWordCount(dayNumber, lib = getCurrentLibrary()) {
      const settings = lib.settings;
      if (settings.pauseNewWords) return 0;
      return clampNumber(settings.dailyTargetWords, 0, 100, 30);
    }

    function getUnlearnedWords(lib = getCurrentLibrary()) {
      return lib.words
        .filter(word => word.firstLearnDay == null)
        .sort((a, b) => a.index - b.index);
    }

    function getPendingWrongWords(lib = getCurrentLibrary()) {
      return lib.words
        .filter(word => word.isPendingWrong)
        .sort((a, b) => a.index - b.index);
    }

    function getDueDelayedReviewWords(dayNumber, lib = getCurrentLibrary()) {
      return lib.words
        .filter(word => {
          const dueDay = word.wrongReviewDueDay ?? word.delayedReviewDay;
          return word.firstLearnDay != null
            && Number(word.wrongCount || 0) > 0
            && !word.isPendingWrong
            && dueDay != null
            && !word.delayedReviewCompleted
            && Number(dueDay) <= Number(dayNumber);
        })
        .sort((a, b) => {
          const ad = a.wrongReviewDueDay ?? a.delayedReviewDay;
          const bd = b.wrongReviewDueDay ?? b.delayedReviewDay;
          if (ad !== bd) return ad - bd;
          return a.index - b.index;
        });
    }

    function applyDailyLimit(pendingWrongWords, dueReviewWords, unlearnedWords, plannedNewCount, settings) {
      const selectedWrongIds = uniqueWordIds(pendingWrongWords.map(word => word.id));
      const selectedIdSet = new Set(selectedWrongIds);
      const selectedReviewIds = [];
      const postponedReviewIds = [];
      const reviewLimit = clampNumber(settings.dailyReviewWords, 0, 100, 30);
      let selectedStandaloneReviewCount = 0;

      dueReviewWords.forEach(word => {
        if (selectedIdSet.has(word.id)) {
          if (!selectedReviewIds.includes(word.id)) selectedReviewIds.push(word.id);
          return;
        }
        if (selectedStandaloneReviewCount < reviewLimit) {
          selectedReviewIds.push(word.id);
          selectedIdSet.add(word.id);
          selectedStandaloneReviewCount += 1;
        } else {
          postponedReviewIds.push(word.id);
        }
      });

      const newWordIds = [];
      const newLimit = clampNumber(plannedNewCount, 0, 100, 30);
      for (const word of unlearnedWords) {
        if (newWordIds.length >= newLimit) break;
        if (selectedIdSet.has(word.id)) continue;
        newWordIds.push(word.id);
        selectedIdSet.add(word.id);
      }

      return {
        pendingWrongWordIds: selectedWrongIds,
        delayedReviewWordIds: uniqueWordIds(selectedReviewIds),
        postponedReviewWordIds: uniqueWordIds(postponedReviewIds),
        newWordIds,
        plannedNewCount,
        actualNewCount: newWordIds.length,
        wrongOverflow: false
      };
    }

    function buildTodayTask(lib = getCurrentLibrary()) {
      if (!lib) return null;
      if (lib.currentDraftTask) return lib.currentDraftTask;

      const dayNumber = getNextDayNumber(lib);
      const plannedNewCount = getPlannedNewWordCount(dayNumber, lib);
      const pendingWrongWords = getPendingWrongWords(lib);
      const dueReviewWords = getDueDelayedReviewWords(dayNumber, lib);
      const unlearnedWords = getUnlearnedWords(lib);
      const limited = applyDailyLimit(pendingWrongWords, dueReviewWords, unlearnedWords, plannedNewCount, lib.settings);
      const sourceMap = {};

      function addSource(ids, source) {
        ids.forEach(id => {
          sourceMap[id] = sourceMap[id] || [];
          if (!sourceMap[id].includes(source)) sourceMap[id].push(source);
        });
      }

      addSource(limited.pendingWrongWordIds, "wrong");
      addSource(limited.delayedReviewWordIds, "review");
      addSource(limited.newWordIds, "new");

      let taskWordIds = Array.from(new Set([
        ...limited.pendingWrongWordIds,
        ...limited.delayedReviewWordIds,
        ...limited.newWordIds
      ]));

      taskWordIds = orderTaskIds(taskWordIds, lib);

      lib.currentDraftTask = {
        taskId: uid("task"),
        dayNumber,
        date: todayDate(),
        createdAt: nowIso(),
        currentIndex: 0,
        taskWordIds,
        newWordIds: limited.newWordIds,
        pendingWrongWordIds: limited.pendingWrongWordIds,
        delayedReviewWordIds: limited.delayedReviewWordIds,
        postponedReviewWordIds: limited.postponedReviewWordIds,
        plannedNewCount: limited.plannedNewCount,
        actualNewCount: limited.actualNewCount,
        wrongOverflow: limited.wrongOverflow,
        sourceMap
      };
      saveData();
      return lib.currentDraftTask;
    }

    function orderTaskIds(ids, lib) {
      const unique = Array.from(new Set(ids));
      if (lib.settings.playOrder === "random") {
        const shuffled = unique.slice();
        for (let i = shuffled.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }
      return unique.sort((a, b) => {
        const wa = getWordById(lib, a);
        const wb = getWordById(lib, b);
        return (wa?.index ?? 0) - (wb?.index ?? 0);
      });
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    function refreshSpeechVoices() {
      if (!("speechSynthesis" in window)) {
        availableSpeechVoices = [];
        return [];
      }
      availableSpeechVoices = window.speechSynthesis.getVoices()
        .filter(voice => /^en([-_]|$)/i.test(voice.lang || ""))
        .sort((a, b) => {
          const score = voicePreferenceScore(b) - voicePreferenceScore(a);
          return score || String(a.name).localeCompare(String(b.name));
        });
      return availableSpeechVoices;
    }

    function voicePreferenceScore(voice) {
      const name = String(voice.name || "").toLowerCase();
      const lang = String(voice.lang || "").toLowerCase();
      let score = 0;
      if (lang === "en-us") score += 20;
      if (name.includes("google us english")) score += 100;
      else if (name.includes("google") && lang.startsWith("en")) score += 70;
      else if (name.includes("microsoft") && lang.startsWith("en")) score += 45;
      else if (name.includes("samantha") || name.includes("alex")) score += 35;
      if (voice.localService) score += 5;
      return score;
    }

    function normalizeVoiceName(name) {
      return String(name || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
    }

    function getVoicePresetById(id) {
      return RECOMMENDED_VOICE_PRESETS.find(preset => preset.id === id) || null;
    }

    function findVoiceForPreset(preset, voices) {
      if (!preset || !voices.length) return null;
      for (const candidateName of preset.names) {
        const normalizedCandidate = normalizeVoiceName(candidateName);
        const exact = voices.find(voice => normalizeVoiceName(voice.name) === normalizedCandidate);
        if (exact) return exact;
        const contains = voices.find(voice => normalizeVoiceName(voice.name).includes(normalizedCandidate));
        if (contains) return contains;
      }
      const sameLang = voices.find(voice => String(voice.lang || "").toLowerCase() === preset.lang.toLowerCase());
      if (sameLang) return sameLang;
      const sameEnglishFamily = voices.find(voice => String(voice.lang || "").toLowerCase().startsWith(preset.lang.slice(0, 2).toLowerCase()));
      return sameEnglishFamily || null;
    }

    function getPreferredSpeechVoice(settings = getCurrentLibrary()?.settings || {}) {
      const voices = availableSpeechVoices.length ? availableSpeechVoices : refreshSpeechVoices();
      if (!voices.length) return null;
      const preset = getVoicePresetById(settings.speechVoiceName) || getVoicePresetById("google-us");
      return findVoiceForPreset(preset, voices) || voices[0];
    }

    function getSpeechVoiceOptionsHtml(selectedName = "") {
      const voices = availableSpeechVoices.length ? availableSpeechVoices : refreshSpeechVoices();
      const selectedPresetId = getVoicePresetById(selectedName) ? selectedName : "google-us";
      return RECOMMENDED_VOICE_PRESETS.map(preset => {
        const matchedVoice = findVoiceForPreset(preset, voices);
        const status = matchedVoice ? "（可用）" : "（自动兜底）";
        return '<option value="' + escapeHtml(preset.id) + '"' + (preset.id === selectedPresetId ? " selected" : "") + '>' + escapeHtml(preset.label + status) + '</option>';
      }).join("");
    }

    function hydrateSpeechVoiceSelects() {
      const lib = getCurrentLibrary();
      if (!lib) return;
      document.querySelectorAll("[data-speech-voice-select]").forEach(select => {
        const current = getVoicePresetById(lib.settings.speechVoiceName) ? lib.settings.speechVoiceName : "google-us";
        lib.settings.speechVoiceName = current;
        select.innerHTML = getSpeechVoiceOptionsHtml(current);
        select.value = current;
      });
    }

    function speakWord(wordText) {
      if (!("speechSynthesis" in window)) {
        alert("当前浏览器不支持 Web Speech API，请换用新版 Chrome、Edge 或 Safari。");
        return;
      }
      const lib = getCurrentLibrary();
      const utterance = new SpeechSynthesisUtterance(String(wordText || ""));
      utterance.lang = lib?.settings?.speechLang || "en-US";
      utterance.rate = clampNumber(lib?.settings?.speechRate, 0.5, 1.5, 0.9);
      const voice = getPreferredSpeechVoice(lib?.settings || {});
      if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang || utterance.lang;
      }
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function startDictation() {
      const lib = getCurrentLibrary();
      if (!lib || !lib.words.length) {
        alert("请先在词库中导入单词。");
        return;
      }
      const task = buildTodayTask(lib);
      dictationIndex = Math.min(Number(task.currentIndex || 0), Math.max(0, task.taskWordIds.length - 1));
      todaySummary = null;
      renderTodayView("player");
    }

    function regenerateTodayTaskFromSettings() {
      const lib = getCurrentLibrary();
      if (!lib || !lib.currentDraftTask) return;
      const ok = confirm("确定要按当前设置重新生成今日任务吗？这不会增加 Day，也不会写入记录。");
      if (!ok) return;
      const taskDate = lib.currentDraftTask.date || todayDate();
      stopAutoPlay();
      lib.currentDraftTask = null;
      const task = buildTodayTask(lib);
      task.date = taskDate;
      dictationIndex = 0;
      todaySummary = null;
      saveData();
      renderTodayView("player");
    }

    function submitTodayResult() {
      const lib = getCurrentLibrary();
      const task = lib.currentDraftTask;
      if (!task) return;
      const checked = Array.from(document.querySelectorAll("[data-wrong-check]:checked")).map(input => input.value);
      const record = createDailyRecord(lib, task, checked, "normal");
      const summary = updateWordStatsFromRecord(lib, record);
      summary.recordId = record.recordId;
      lib.dailyRecords.push(record);
      lib.currentDraftTask = null;
      lib.updatedAt = todayDate();
      todaySummary = summary;
      dictationIndex = 0;
      stopAutoPlay();
      saveData();
      renderTodayView("summary");
    }

    function undoLatestDailyRecord() {
      const lib = getCurrentLibrary();
      if (!lib || !lib.dailyRecords.length) {
        alert("没有可撤销的完成记录。");
        return;
      }
      const ok = confirm("确定要撤销最近一次完成记录吗？这会删除最后一天的记录，并重新计算词库状态。");
      if (!ok) return;
      const latest = lib.dailyRecords.slice().sort((a, b) => {
        const dayOrder = Number(b.dayNumber || 0) - Number(a.dayNumber || 0);
        return dayOrder || String(b.completedAt || "").localeCompare(String(a.completedAt || ""));
      })[0];
      const latestIndex = lib.dailyRecords.indexOf(latest);
      if (latestIndex >= 0) lib.dailyRecords.splice(latestIndex, 1);
      lib.currentDraftTask = null;
      todaySummary = null;
      dictationIndex = 0;
      recalculateLibraryState(lib);
      lib.updatedAt = todayDate();
      saveData();
      renderApp();
    }

    function createDailyRecord(lib, task, wrongWordIds, source = "normal") {
      return {
        recordId: uid("rec"),
        dayNumber: Number(task.dayNumber),
        date: task.date || todayDate(),
        taskWordIds: uniqueWordIds(task.taskWordIds),
        newWordIds: uniqueWordIds(task.newWordIds),
        pendingWrongWordIds: uniqueWordIds(task.pendingWrongWordIds),
        delayedReviewWordIds: uniqueWordIds(task.delayedReviewWordIds),
        postponedReviewWordIds: uniqueWordIds(task.postponedReviewWordIds),
        wrongWordIds: uniqueWordIds(wrongWordIds),
        completedAt: nowIso(),
        source,
        sourceMap: clone(task.sourceMap || {}),
        plannedNewCount: Number(task.plannedNewCount || 0),
        actualNewCount: Number(task.actualNewCount || task.newWordIds.length || 0)
      };
    }

    function getRecordDate(record) {
      if (record?.date) return record.date;
      if (record?.completedAt) return String(record.completedAt).slice(0, 10);
      if (record?.createdAt) return String(record.createdAt).slice(0, 10);
      return todayDate();
    }

    function clearWrongReview(word, completedCount = Number(word.wrongReviewCompletedCount || 0)) {
      word.wrongReviewDueDay = null;
      word.delayedReviewDay = null;
      word.delayedReviewPostponed = false;
      word.delayedReviewCompleted = true;
      word.wrongReviewStage = 0;
      word.wrongReviewCompletedCount = completedCount;
    }

    function scheduleWrongReview(word, fromDay, lib, completedCount = 0) {
      const dueDay = Number(fromDay) + Number(lib.settings.reviewDelayDays || 15);
      word.wrongReviewDueDay = dueDay;
      word.delayedReviewDay = dueDay;
      word.delayedReviewCompleted = false;
      word.delayedReviewPostponed = false;
      word.wrongReviewCompletedCount = completedCount;
      word.wrongReviewStage = completedCount + 1;
    }

    function updateWordStatsFromRecord(lib, record) {
      const wrongSet = new Set(record.wrongWordIds || []);
      const delayedSet = new Set(record.delayedReviewWordIds || []);
      const newSet = new Set(record.newWordIds || []);
      const recordDate = getRecordDate(record);
      const pendingBefore = new Set(lib.words.filter(word => word.isPendingWrong).map(word => word.id));
      const movedOut = [];
      const newWrong = [];
      const continuedWrong = [];

      newSet.forEach(id => {
        const word = getWordById(lib, id);
        if (!word) return;
        if (word.firstLearnDay == null) {
          word.firstLearnDay = Number(record.dayNumber);
          clearWrongReview(word, 0);
        }
      });

      (record.postponedReviewWordIds || []).forEach(id => {
        const word = getWordById(lib, id);
        if (word) word.delayedReviewPostponed = true;
      });

      (record.taskWordIds || []).forEach(id => {
        const word = getWordById(lib, id);
        if (!word) return;
        const wasWrong = wrongSet.has(id);
        if (wasWrong) {
          word.wrongCount = Number(word.wrongCount || 0) + 1;
          word.lastWrongDay = Number(record.dayNumber);
          word.lastWrongDate = recordDate;
          word.isPendingWrong = true;
          word.correctStreakInWrongPool = 0;
          clearWrongReview(word, 0);
          if (pendingBefore.has(id)) continuedWrong.push(id);
          else newWrong.push(id);
        } else if (pendingBefore.has(id)) {
          word.correctStreakInWrongPool = Number(word.correctStreakInWrongPool || 0) + 1;
          if (word.correctStreakInWrongPool >= Number(lib.settings.correctTimesToExitWrongPool || 1)) {
            word.isPendingWrong = false;
            word.correctStreakInWrongPool = 0;
            word.lastExitedWrongPoolDay = Number(record.dayNumber);
            scheduleWrongReview(word, record.dayNumber, lib, 0);
            movedOut.push(id);
          }
        } else if (delayedSet.has(id)) {
          const completedCount = Number(word.wrongReviewCompletedCount || 0) + 1;
          if (Number(word.wrongCount || 0) >= 2 && completedCount < 2) {
            scheduleWrongReview(word, record.dayNumber, lib, completedCount);
          } else {
            clearWrongReview(word, completedCount);
          }
        }
        applyWrongFlags(word);
      });

      const currentWrongCount = getPendingWrongWords(lib).length;
      const focusCount = lib.words.filter(word => word.isFocus && word.wrongCount > 0).length;
      const stubbornCount = lib.words.filter(word => word.isStubborn && word.wrongCount > 0).length;
      const total = (record.taskWordIds || []).length;
      const wrong = wrongSet.size;

      return {
        dayNumber: record.dayNumber,
        total,
        correct: Math.max(0, total - wrong),
        wrong,
        rate: total ? Math.round(((total - wrong) / total) * 100) : 0,
        newWrong,
        continuedWrong,
        movedOut,
        currentWrongCount,
        focusCount,
        stubbornCount,
        learnedCount: lib.words.filter(word => word.firstLearnDay != null).length,
        totalWords: lib.words.length,
        nextDay: getNextDayNumber(lib) + 1
      };
    }

    function applyWrongFlags(word) {
      word.isFocus = word.manualFocus === null || word.manualFocus === undefined
        ? Number(word.wrongCount || 0) >= 2
        : Boolean(word.manualFocus);
      word.isStubborn = word.manualStubborn === null || word.manualStubborn === undefined
        ? Number(word.wrongCount || 0) >= 3
        : Boolean(word.manualStubborn);
    }

    function recalculateLibraryState(lib = getCurrentLibrary(), options = {}) {
      if (!lib) return;
      const draftTask = options.preserveDraft ? lib.currentDraftTask : null;
      lib.words.forEach((word, index) => {
        const manualFocus = word.manualFocus ?? null;
        const manualStubborn = word.manualStubborn ?? null;
        const wordText = word.word;
        const meaning = word.meaning;
        const id = word.id;
        const originalNo = word.originalNo;
        const originalIndex = Number.isFinite(word.index) ? word.index : index;
        Object.assign(word, makeWord(wordText, meaning, originalIndex));
        word.id = id;
        word.originalNo = originalNo ?? originalIndex + 1;
        word.manualFocus = manualFocus;
        word.manualStubborn = manualStubborn;
        applyWrongFlags(word);
      });
      lib.dailyRecords
        .slice()
        .sort((a, b) => Number(a.dayNumber) - Number(b.dayNumber))
        .forEach(record => updateWordStatsFromRecord(lib, record));
      lib.currentDraftTask = options.preserveDraft ? draftTask : null;
      lib.updatedAt = todayDate();
      if (!options.silent) saveData();
    }

    function removeWordIdFromTaskLike(task, wordId) {
      if (!task) return;
      [
        "taskWordIds",
        "newWordIds",
        "pendingWrongWordIds",
        "delayedReviewWordIds",
        "postponedReviewWordIds",
        "wrongWordIds"
      ].forEach(key => {
        if (Array.isArray(task[key])) {
          task[key] = task[key].filter(id => id !== wordId);
        }
      });
      if (task.sourceMap && typeof task.sourceMap === "object") {
        delete task.sourceMap[wordId];
      }
    }

    function deleteWordFromLibrary(lib, wordId) {
      const word = getWordById(lib, wordId);
      if (!word) return;
      const hasRecords = lib.dailyRecords.some(record => {
        return [
          "taskWordIds",
          "newWordIds",
          "pendingWrongWordIds",
          "delayedReviewWordIds",
          "postponedReviewWordIds",
          "wrongWordIds"
        ].some(key => Array.isArray(record[key]) && record[key].includes(wordId));
      });
      const message = hasRecords
        ? "确定删除“" + word.word + "”吗？它已经出现在历史听写记录中，删除后会从历史记录里移除并重新计算词库状态。"
        : "确定删除“" + word.word + "”吗？";
      if (!confirm(message)) return;
      lib.words = lib.words.filter(item => item.id !== wordId);
      lib.words.forEach((item, index) => item.index = index);
      lib.dailyRecords.forEach(record => removeWordIdFromTaskLike(record, wordId));
      removeWordIdFromTaskLike(lib.currentDraftTask, wordId);
      lib.currentDraftTask = null;
      if (manualStrictTask) removeWordIdFromTaskLike(manualStrictTask, wordId);
      if (manualBatchSession?.currentTask) removeWordIdFromTaskLike(manualBatchSession.currentTask, wordId);
      recalculateLibraryState(lib);
      alert("已删除该单词，并重新计算词库状态。");
      renderLibraryManager();
    }

    function addManualRecord(task, wrongWordIds, source = "manual") {
      const lib = getCurrentLibrary();
      if (!lib) return;
      const existing = lib.dailyRecords.find(record => Number(record.dayNumber) === Number(task.dayNumber));
      if (existing) {
        const ok = confirm("Day " + task.dayNumber + " 已有记录。继续会覆盖这一天的历史记录，并重新计算词库状态。");
        if (!ok) return;
        lib.dailyRecords = lib.dailyRecords.filter(record => Number(record.dayNumber) !== Number(task.dayNumber));
      }
      const record = createDailyRecord(lib, task, wrongWordIds, source);
      record.date = task.date || todayDate();
      record.completedAt = task.completedAt || nowIso();
      record.skipDelayedReviewSchedule = Boolean(task.skipDelayedReviewSchedule);
      lib.dailyRecords.push(record);
      recalculateLibraryState(lib);
      manualStrictTask = null;
      alert("已保存补录记录，并完成重新计算。");
      renderManualUpdateView();
    }

    function buildManualBackfillTask(dayNumber, customNewCount = null) {
      const lib = getCurrentLibrary();
      const stateBefore = getLibraryStateBeforeDay(dayNumber);
      const plannedNewCount = customNewCount == null
        ? getPlannedNewWordCount(dayNumber, stateBefore)
        : Math.max(0, Number(customNewCount || 0));
      const limited = applyDailyLimit(
        getPendingWrongWords(stateBefore),
        getDueDelayedReviewWords(dayNumber, stateBefore),
        getUnlearnedWords(stateBefore),
        plannedNewCount,
        stateBefore.settings
      );
      const sourceMap = {};

      function addSource(ids, source) {
        ids.forEach(id => {
          sourceMap[id] = sourceMap[id] || [];
          if (!sourceMap[id].includes(source)) sourceMap[id].push(source);
        });
      }

      addSource(limited.pendingWrongWordIds, "wrong");
      addSource(limited.delayedReviewWordIds, "review");
      addSource(limited.newWordIds, "new");

      const taskWordIds = orderTaskIds(Array.from(new Set([
        ...limited.pendingWrongWordIds,
        ...limited.delayedReviewWordIds,
        ...limited.newWordIds
      ])), lib);

      return {
        dayNumber: Number(dayNumber),
        taskWordIds,
        newWordIds: limited.newWordIds,
        pendingWrongWordIds: limited.pendingWrongWordIds,
        delayedReviewWordIds: limited.delayedReviewWordIds,
        postponedReviewWordIds: limited.postponedReviewWordIds,
        plannedNewCount: limited.plannedNewCount,
        actualNewCount: limited.actualNewCount,
        wrongOverflow: limited.wrongOverflow,
        sourceMap
      };
    }

    function startBatchManualBackfill() {
      const lib = getCurrentLibrary();
      if (!lib.words.length) {
        alert("请先在词库中导入单词。");
        return;
      }
      const startDay = Math.max(1, Number(document.getElementById("batchStartDay").value || getNextDayNumber(lib)));
      const totalDays = Math.max(1, Number(document.getElementById("batchDays").value || 1));
      const customValue = document.getElementById("batchNewCount").value.trim();
      const customNewCount = customValue === "" ? null : Number(customValue);
      const existingDays = lib.dailyRecords
        .filter(record => Number(record.dayNumber) >= startDay && Number(record.dayNumber) < startDay + totalDays)
        .map(record => record.dayNumber);
      if (existingDays.length) {
        const ok = confirm("这些 Day 已有记录：" + existingDays.join("、") + "。继续补录时，同一天保存会覆盖原记录并重新计算。");
        if (!ok) return;
      }
      manualBatchSession = {
        startDay,
        totalDays,
        currentOffset: 0,
        customNewCount,
        currentTask: buildManualBackfillTask(startDay, customNewCount)
      };
      renderBatchManualTab();
    }

    function saveBatchManualDay() {
      const lib = getCurrentLibrary();
      if (!manualBatchSession || !manualBatchSession.currentTask) return;
      const task = manualBatchSession.currentTask;
      const wrongIds = Array.from(document.querySelectorAll("[data-batch-wrong]:checked")).map(input => input.value);
      const existing = lib.dailyRecords.find(record => Number(record.dayNumber) === Number(task.dayNumber));
      if (existing) {
        const ok = confirm("Day " + task.dayNumber + " 已有记录。保存会覆盖这一天并重新计算，确定吗？");
        if (!ok) return;
        lib.dailyRecords = lib.dailyRecords.filter(record => Number(record.dayNumber) !== Number(task.dayNumber));
      }
      const record = createDailyRecord(lib, task, wrongIds, "manual-batch");
      lib.dailyRecords.push(record);
      recalculateLibraryState(lib);

      manualBatchSession.currentOffset += 1;
      if (manualBatchSession.currentOffset >= manualBatchSession.totalDays) {
        const finishedDays = manualBatchSession.totalDays;
        manualBatchSession = null;
        alert("连续补录完成：已保存 " + finishedDays + " 天，并按原规则重新计算错词池和错词本。");
        renderBatchManualTab();
        return;
      }
      const nextDay = manualBatchSession.startDay + manualBatchSession.currentOffset;
      manualBatchSession.currentTask = buildManualBackfillTask(nextDay, manualBatchSession.customNewCount);
      renderBatchManualTab();
    }

    function quickCalibrateProgress() {
      const lib = getCurrentLibrary();
      const count = Math.max(0, Math.min(lib.words.length, Number(document.getElementById("quickCount").value || 0)));
      const scheduleReviews = document.getElementById("quickScheduleReviews").checked;
      const wrongText = document.getElementById("quickWrongText").value;
      if (!count) {
        alert("请先输入已完成到第几个单词。");
        return;
      }
      const ok = confirm("快速校准会追加近似历史记录，并重新计算词库状态。继续吗？");
      if (!ok) return;

      const wrongIds = new Set();
      parseWordList(wrongText).forEach(item => {
        const word = findWordByImportedItem(lib, item);
        if (word && word.index < count) wrongIds.add(word.id);
      });

      let cursor = 0;
      let day = getNextDayNumber(lib);
      const newRecords = [];
      while (cursor < count) {
        const planned = getPlannedNewWordCount(day, lib);
        const chunkSize = planned > 0 ? planned : 30;
        const chunk = lib.words.slice(cursor, Math.min(count, cursor + chunkSize));
        const taskIds = chunk.map(word => word.id);
        const recordWrongIds = cursor + chunk.length >= count ? Array.from(wrongIds) : [];
        const task = {
          dayNumber: day,
          taskWordIds: Array.from(new Set([...taskIds, ...recordWrongIds])),
          newWordIds: taskIds,
          pendingWrongWordIds: [],
          delayedReviewWordIds: [],
          postponedReviewWordIds: [],
          sourceMap: Object.fromEntries(taskIds.map(id => [id, ["new"]])),
          plannedNewCount: taskIds.length,
          actualNewCount: taskIds.length,
          skipDelayedReviewSchedule: !scheduleReviews
        };
        const record = createDailyRecord(lib, task, recordWrongIds, "quick");
        record.skipDelayedReviewSchedule = !scheduleReviews;
        newRecords.push(record);
        cursor += chunk.length;
        day += 1;
      }
      lib.dailyRecords.push(...newRecords);
      recalculateLibraryState(lib);
      alert("快速校准完成。");
      renderManualUpdateView();
    }

    function manualUpdateWrongPool(wordId, updates) {
      const lib = getCurrentLibrary();
      const word = getWordById(lib, wordId);
      if (!word) return;
      if ("isPendingWrong" in updates) word.isPendingWrong = Boolean(updates.isPendingWrong);
      if ("wrongCount" in updates) {
        word.wrongCount = Math.max(0, Number(updates.wrongCount || 0));
        if (word.wrongCount > 0 && !word.lastWrongDate) word.lastWrongDate = todayDate();
      }
      if ("manualFocus" in updates) word.manualFocus = updates.manualFocus;
      if ("manualStubborn" in updates) word.manualStubborn = updates.manualStubborn;
      if (word.isPendingWrong && word.wrongCount === 0) {
        word.wrongCount = 1;
        word.lastWrongDay = word.lastWrongDay || getNextDayNumber(lib) - 1 || 1;
        word.lastWrongDate = word.lastWrongDate || todayDate();
      }
      applyWrongFlags(word);
      lib.updatedAt = todayDate();
      saveData();
      renderApp();
    }

    function isWordLearnedLocked(lib, word) {
      if (word.firstLearnDay != null) return true;
      return lib.dailyRecords.some(record => {
        return ["newWordIds", "taskWordIds"].some(key => Array.isArray(record[key]) && record[key].includes(word.id));
      });
    }

    function getSortableUnlearnedWords(lib) {
      return lib.words
        .filter(word => !isWordLearnedLocked(lib, word))
        .sort((a, b) => a.index - b.index);
    }

    function applyUnlearnedOrder(lib, orderedUnlearnedWords) {
      const queue = orderedUnlearnedWords.slice();
      const nextWords = lib.words
        .slice()
        .sort((a, b) => a.index - b.index)
        .map(word => isWordLearnedLocked(lib, word) ? word : queue.shift());
      nextWords.forEach((word, index) => word.index = index);
      lib.words.sort((a, b) => a.index - b.index);
      lib.updatedAt = todayDate();
      saveData();
      renderLibraryManager();
    }

    function moveUnlearnedWord(lib, wordId, targetPosition) {
      const unlearnedWords = getSortableUnlearnedWords(lib);
      const currentIndex = unlearnedWords.findIndex(word => word.id === wordId);
      if (currentIndex < 0) return;
      const nextIndex = Math.max(0, Math.min(unlearnedWords.length - 1, Number(targetPosition) - 1));
      if (nextIndex === currentIndex) return;
      const [word] = unlearnedWords.splice(currentIndex, 1);
      unlearnedWords.splice(nextIndex, 0, word);
      applyUnlearnedOrder(lib, unlearnedWords);
    }

    function wordEditDuplicateExists(lib, currentWordId, wordText, meaning) {
      const nextKey = getWordDuplicateKey(wordText, meaning);
      return lib.words.some(word => word.id !== currentWordId && getWordDuplicateKey(word.word, word.meaning) === nextKey);
    }

    function bindTaskDateInput(lib, task) {
      const input = document.getElementById("taskDateInput");
      if (!input || !task) return;
      input.onchange = () => {
        task.date = input.value || todayDate();
        lib.currentDraftTask = task;

    function saveCurrentDictationIndex() {
      const lib = getCurrentLibrary();
      const task = lib?.currentDraftTask;
      if (!task) return;
      task.currentIndex = Math.max(0, Number(dictationIndex || 0));
      saveData();

    function renderNoTaskPanel(lib) {
      if (!lib.words.length) {
        return '<section class="card span-12"><div class="empty">当前词库还没有单词。请先到词库导入。</div></section>';
      }
      const dayNumber = getNextDayNumber(lib);
      const planned = getPlannedNewWordCount(dayNumber, lib);
      const reviewCount = clampNumber(lib.settings.dailyReviewWords, 0, 100, 30);
      const dueCount = getDueDelayedReviewWords(dayNumber, lib).length;
      return `
        <section class="card span-12">
          <div class="stack">
            <div class="notice small">点击开始后会生成今日任务。任务生成后会保留在浏览器中，只有提交错词结果才算完成这一天。</div>
            <div>当天新词数：<span class="strong">${planned}</span> 个。</div>
            <div>当前错词池会全部进入今日任务。</div>
            ${dueCount > 0 ? '<div>当前有 <span class="strong">' + dueCount + '</span> 个到期错词复查，本次最多取 <span class="strong">' + reviewCount + '</span> 个。</div>' : ''}
            ${lib.settings.pauseNewWords ? '<div class="notice">当前已暂停新词，今日只安排错词和到期错词复查。</div>' : ''}
            <button id="startDictationBtn">生成/开始今日听写</button>
          </div>
        </section>
      `;
    }

    function getTaskCategoryCounts(task) {
      const taskSet = new Set(uniqueWordIds(task?.taskWordIds || []));
      const wrongSet = new Set(uniqueWordIds(task?.pendingWrongWordIds || []).filter(id => taskSet.has(id)));
      const reviewSet = new Set(uniqueWordIds(task?.delayedReviewWordIds || []).filter(id => taskSet.has(id) && !wrongSet.has(id)));
      const newSet = new Set(uniqueWordIds(task?.newWordIds || []).filter(id => taskSet.has(id) && !wrongSet.has(id) && !reviewSet.has(id)));
      return {
        total: taskSet.size,
        wrong: wrongSet.size,
        review: reviewSet.size,
        new: newSet.size
      };
    }

    function renderTaskCountSummary(counts) {
      const parts = ["新词 " + counts.new, "错词复习 " + counts.wrong];
      if (counts.review > 0) parts.push("到期错词复查 " + counts.review);
      return "今日 " + counts.total + " 个：" + parts.join(" + ");
    }

    function renderTaskPanel(lib, task, mode) {
      const categoryCounts = getTaskCategoryCounts(task);
      const dueActual = categoryCounts.review;
      const notices = [];
      if (lib.settings.pauseNewWords) notices.push("当前已暂停新词，今日只安排错词和到期错词复查。");
      if (task.postponedReviewWordIds.length) {
        notices.push("有 " + task.postponedReviewWordIds.length + " 个到期错词复查超过当天到期复查数，已顺延到后续。");

      return `
        <section class="card span-12">
          <div class="notice small" style="margin-bottom:12px">${renderTaskCountSummary(categoryCounts)}</div>
          <div class="stats">
            <div class="stat"><div class="small muted">今日总词数</div><div class="num">${categoryCounts.total}</div></div>
            <div class="stat"><div class="small muted">今日错词复习</div><div class="num">${categoryCounts.wrong}</div></div>
            <div class="stat"><div class="small muted">今日到期错词复查</div><div class="num">${categoryCounts.review}</div></div>
            <div class="stat"><div class="small muted">今日新词</div><div class="num">${categoryCounts.new}</div></div>
          </div>
          <div class="row" style="margin-top:12px">
            <label style="max-width:220px">本次记录日期
              <input id="taskDateInput" type="date" value="${escapeHtml(task.date || todayDate())}">
            </label>
            <button class="secondary" id="exportTodayTaskBtn">导出听写纸</button>
            <span class="small muted">默认使用电脑日期，也可以手动改成实际听写日期。</span>
          </div>
          ${notices.map(text => '<div class="notice small" style="margin-top:10px">' + escapeHtml(text) + '</div>').join("")}

    function renderPlayerPanel(lib, task) {
      const total = task.taskWordIds.length;
      const currentId = task.taskWordIds[dictationIndex];
      const currentWord = getWordById(lib, currentId);
      if (!total) {
        return '<section class="card span-12"><div class="empty">今天没有需要听写的单词。可以休息，或到词库追加新词。</div></section>';
      }
      return `
        <section class="card span-12">
          <div class="player">
            <div>
              <div class="progress-big">第 ${dictationIndex + 1} / ${total} 个</div>
              <div class="word-hidden">听写过程中不显示英文和中文释义</div>
            </div>
            <div class="split" style="width:min(680px, 100%); text-align:left">
              <label>语速：<span id="playerSpeechRateText">${Number(lib.settings.speechRate || 0.9).toFixed(1)}x</span>
                <input id="playerSpeechRate" type="range" min="0.5" max="1.5" step="0.1" value="${escapeHtml(lib.settings.speechRate || 0.9)}">
              </label>

            <div class="stack" style="width:min(680px, 100%)">

                <button class="${lib.settings.showAnswerMeaning ? "secondary" : "ghost"}" id="toggleMeaningBtn">${lib.settings.showAnswerMeaning ? "隐藏中文释义" : "显示中文释义"}</button>

    function renderAnswerRevealHtml(word, lib) {

        pieces.push('<div class="notice"><span class="strong">英文：</span>' + escapeHtml(word?.word || "") + '</div>');

            </div>
          </div>
          <div id="selectedWrongSummary" class="notice small" style="margin-top:12px">当前未勾选错词。提交后本次将按全对记录。</div>

    function bindPlayerEvents(lib, task) {
      if (!task) return;
      const currentId = task.taskWordIds[dictationIndex];
      const currentWord = getWordById(lib, currentId);
      const play = () => currentWord && speakWord(currentWord.word);
      const playButton = document.getElementById("playCurrentBtn");
      if (playButton) playButton.onclick = play;
      const goAndPlay = direction => {
        playAdjacentFromKeyboard(direction);
      };
      const prevButton = document.getElementById("prevWordBtn");
      if (prevButton) prevButton.onclick = () => goAndPlay(-1);
      const nextButton = document.getElementById("nextWordBtn");
      if (nextButton) nextButton.onclick = () => {
        if (dictationIndex >= task.taskWordIds.length - 1) {
          stopAutoPlay();
          renderTodayView("mark");
        } else {
          goAndPlay(1);
        }
      };
      const autoButton = document.getElementById("autoPlayBtn");
      if (autoButton) autoButton.onclick = () => startAutoPlay();
      const stopButton = document.getElementById("stopAutoBtn");
      if (stopButton) stopButton.onclick = () => stopAutoPlay();
      const markButton = document.getElementById("goMarkBtn");
      if (markButton) markButton.onclick = () => {
        stopAutoPlay();
        renderTodayView("mark");
      };
      const rateInput = document.getElementById("playerSpeechRate");
      const rateText = document.getElementById("playerSpeechRateText");
      if (rateInput) {
        rateInput.oninput = () => {
          const value = clampNumber(rateInput.value, 0.5, 1.5, 0.9);
          lib.settings.speechRate = value;
          if (rateText) rateText.textContent = value.toFixed(1) + "x";
          saveData();
        };
        rateInput.onchange = play;
      }
      const voiceSelect = document.getElementById("playerSpeechVoice");
      if (voiceSelect) {
        voiceSelect.onchange = () => {
          lib.settings.speechVoiceName = voiceSelect.value || "google-us";
          saveData();
          play();
        };
      }
      const revealBox = document.getElementById("answerRevealBox");
      const toggleEnglishButton = document.getElementById("toggleEnglishBtn");
      const toggleMeaningButton = document.getElementById("toggleMeaningBtn");
      const refreshReveal = () => {
        if (revealBox) revealBox.innerHTML = renderAnswerRevealHtml(currentWord, lib);
        if (toggleEnglishButton) {
          toggleEnglishButton.textContent = lib.settings.showAnswerEnglish ? "隐藏英文" : "显示英文";
          toggleEnglishButton.className = lib.settings.showAnswerEnglish ? "secondary" : "ghost";
        }
        if (toggleMeaningButton) {
          toggleMeaningButton.textContent = lib.settings.showAnswerMeaning ? "隐藏中文释义" : "显示中文释义";
          toggleMeaningButton.className = lib.settings.showAnswerMeaning ? "secondary" : "ghost";
        }
      };
      if (toggleEnglishButton) {
        toggleEnglishButton.onclick = () => {
          lib.settings.showAnswerEnglish = !lib.settings.showAnswerEnglish;
          saveData();
          refreshReveal();
        };
      }
      if (toggleMeaningButton) {
        toggleMeaningButton.onclick = () => {
          lib.settings.showAnswerMeaning = !lib.settings.showAnswerMeaning;
          saveData();
          refreshReveal();
        };
      }
    }

    function bindSubmitEvents() {
      const submitButton = document.getElementById("submitResultBtn");
      if (submitButton) submitButton.onclick = () => {
        const ok = confirm("确定提交今日结果吗？提交后会计入一个学习 Day。");
        if (ok) submitTodayResult();
      };
      const wrongChecks = document.querySelectorAll("[data-wrong-check]");
      if (wrongChecks.length) {
        const update = () => renderSelectedWrongSummary(getCurrentLibrary());
        wrongChecks.forEach(input => input.addEventListener("change", update));
        update();
      }
    }

    function renderSelectedWrongSummary(lib) {
      const selected = Array.from(document.querySelectorAll("[data-wrong-check]:checked")).map(input => input.value);
      const summary = document.getElementById("selectedWrongSummary");
      const hint = document.getElementById("submitWrongCountHint");
      if (!summary && !hint) return;
      if (!selected.length) {
        if (summary) summary.textContent = "当前未勾选错词。提交后本次将按全对记录。";
        if (hint) hint.textContent = "将提交 0 个错词，本次按全对记录。";
        return;
      }
      const details = selected.map(id => {
        const word = getWordById(lib, id);
        return getWordOriginalNo(word, word?.index || 0) + " " + (word?.word || id);
      });
      if (summary) summary.textContent = "已勾选 " + selected.length + " 个错词：" + details.join("、");
      if (hint) hint.textContent = "将提交 " + selected.length + " 个错词。";
    }

    function startAutoPlay() {
      const lib = getCurrentLibrary();
      const task = lib.currentDraftTask;
      if (!task) return;
      stopAutoPlay();
      const intervalMs = Number(lib.settings.autoPlayIntervalSeconds || 5) * 1000;
      const repeatTimes = Math.max(1, Math.min(10, Number(lib.settings.autoPlayRepeatTimes || 1)));
      const repeatGapMs = Math.max(900, Math.min(intervalMs, 1800));
      const playAndAdvance = () => {
        const currentId = task.taskWordIds[dictationIndex];
        const word = getWordById(lib, currentId);
        let played = 0;
        const playRepeat = () => {
          if (word) speakWord(word.word);
          played += 1;
          if (played < repeatTimes) {
            autoTimer = setTimeout(playRepeat, repeatGapMs);
            return;
          }
          if (dictationIndex >= task.taskWordIds.length - 1) {
            stopAutoPlay();
            setTimeout(() => renderTodayView("mark"), Math.max(1200, intervalMs));
            return;
          }
          dictationIndex += 1;
          saveCurrentDictationIndex();
          autoTimer = setTimeout(() => {
            renderTodayView("player");
            playAndAdvance();
          }, intervalMs);
        };
        playRepeat();
      };
      playAndAdvance();
    }

    function stopAutoPlay() {
      if (autoTimer) clearTimeout(autoTimer);
      autoTimer = null;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function isTypingTarget(target) {
      const tag = String(target?.tagName || "").toLowerCase();
      return ["input", "textarea", "select"].includes(tag) || Boolean(target?.isContentEditable);
    }

    function playAdjacentFromKeyboard(direction) {
      const lib = getCurrentLibrary();
      const task = lib?.currentDraftTask;
      if (viewName !== "today" || todaySummary || !task || !task.taskWordIds?.length) return;
      const nextIndex = dictationIndex + direction;
      if (nextIndex < 0) return;
      if (nextIndex >= task.taskWordIds.length) {
        stopAutoPlay();
        renderTodayView("mark");
        return;
      }
      stopAutoPlay();
      dictationIndex = nextIndex;
      saveCurrentDictationIndex();
      renderTodayView("player");
      setTimeout(() => {
        const nextLib = getCurrentLibrary();
        const nextTask = nextLib?.currentDraftTask;
        const nextId = nextTask?.taskWordIds?.[dictationIndex];
        const nextWord = nextId ? getWordById(nextLib, nextId) : null;
        if (nextWord) speakWord(nextWord.word);
      }, 60);
    }

    function renderSummary(lib, summary) {
      const wordList = ids => ids.length
        ? ids.map(id => escapeHtml(getWordById(lib, id)?.word || id)).join("、")
        : "无";
      return `
        <div class="grid">
          <section class="card span-12">
            <h2>今日总结 · Day ${summary.dayNumber}</h2>
            <div class="success">已保存今日听写结果。</div>
          </section>
          <section class="card span-12">
            <div class="stats">
              <div class="stat"><div class="small muted">今日总词数</div><div class="num">${summary.total}</div></div>
              <div class="stat"><div class="small muted">正确数量</div><div class="num">${summary.correct}</div></div>
              <div class="stat"><div class="small muted">错误数量</div><div class="num">${summary.wrong}</div></div>
              <div class="stat"><div class="small muted">正确率</div><div class="num">${summary.rate}%</div></div>

              <div class="stat"><div class="small muted">重点错词</div><div class="num">${summary.focusCount}</div></div>
              <div class="stat"><div class="small muted">顽固错词</div><div class="num">${summary.stubbornCount}</div></div>
              <div class="stat"><div class="small muted">已学 / 总数</div><div class="num">${summary.learnedCount} / ${summary.totalWords}</div></div>
            </div>
          </section>
          <section class="card span-12">
            <div class="stack">

              <div><span class="strong">本日继续错误的旧错词：</span>${wordList(summary.continuedWrong)}</div>
              <div><span class="strong">本日改对并移出错词池：</span>${wordList(summary.movedOut)}</div>

          </section>
        </div>
      `;
    }

    function renderLatestResultWrongWords(lib, summary) {
      const record = lib.dailyRecords.find(item => item.recordId === summary.recordId);
      const details = record ? getWrongWordsForRecord(lib, record) : [];
      if (!details.length) {
        return `
          <div class="stack" style="margin-top:10px">

              <tbody>
                ${details.map(item => `
                  <tr>
                    <td class="word-cell">${escapeHtml(item.entryText)}</td>
                    <td>${escapeHtml(item.meaning)}</td>
                    <td>${escapeHtml(item.sourceLabel)}</td>
                    <td>${item.wrongCount}</td>
                  </tr>
                `).join("")}
              </tbody>

    function renderWrongBook() {
      const lib = getCurrentLibrary();
      const filter = document.getElementById("wrongFilter")?.value || "all";
      const sort = document.getElementById("wrongSort")?.value || "count";
      let words = lib.words.filter(word => word.wrongCount > 0 || word.isPendingWrong);
      if (filter === "pending") words = words.filter(word => word.isPendingWrong);
      if (filter === "focus") words = words.filter(word => word.isFocus);
      if (filter === "stubborn") words = words.filter(word => word.isStubborn);
      words.sort((a, b) => {
        if (sort === "word") return String(a.word || "").localeCompare(String(b.word || ""));
        if (sort === "index") return a.index - b.index;
        if (sort === "first") return (a.firstLearnDay || 999999) - (b.firstLearnDay || 999999);
        return (b.wrongCount || 0) - (a.wrongCount || 0);
      });

      document.getElementById("app").innerHTML = `
        <div class="grid">
          <section class="card span-12">
            <div class="row between">
              <div>
                <h2>错词本</h2>
                <div class="small muted">这里保留历史上所有曾经错过的词，和当前错词池分开管理。</div>
                <div class="small muted">移出错词池后，这个词不再每天强制复习，但历史错误次数仍保留。如果这个词是当时误标为错误，请到 工具 → 历史记录修改 中修正对应 Day 的错词勾选，系统会自动重算错误次数和错词池。</div>
              </div>
              <div class="row">
                <label>筛选
                  <select id="wrongFilter">
                    <option value="all">全部错词</option>
                    <option value="pending">当前错词池</option>
                    <option value="focus">重点错词</option>
                    <option value="stubborn">顽固错词</option>
                  </select>
                </label>
                <label>排序
                  <select id="wrongSort">
                    <option value="count">按错误次数从高到低</option>
                    <option value="first">按第一次学习 Day</option>
                    <option value="word">按英文</option>
                    <option value="index">按导入顺序</option>
                  </select>
                </label>
                <button class="secondary" id="exportWrongWordsBtn">导出当前筛选错词</button>
              </div>
            </div>
          </section>
          <section class="card span-12">
            ${renderWrongTable(lib, words)}
          </section>
        </div>
      `;
      document.getElementById("wrongFilter").value = filter;
      document.getElementById("wrongSort").value = sort;
      document.getElementById("wrongFilter").onchange = renderWrongBook;
      document.getElementById("wrongSort").onchange = renderWrongBook;
      document.getElementById("exportWrongWordsBtn").onclick = () => {
        const filterLabels = { all: "全部", pending: "当前错词池", focus: "重点", stubborn: "顽固" };
        exportWrongWordsToCsv(lib, words, filterLabels[filter] || "错词");
      };
      bindWrongActions();
    }

      if (!words.length) return '<div class="empty">当前筛选下没有错词。</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>英文</th>
                <th>中文释义</th>
                <th>错误次数</th>
                <th>状态</th>
                <th>首次学习</th>
                <th>错词复查</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${words.map(word => `
                <tr>
                  <td class="word-cell">${escapeHtml(word.word)}</td>
                  <td>${escapeHtml(word.meaning || "")}</td>

    function getLibraryStateBeforeDay(dayNumber) {
      const lib = clone(getCurrentLibrary());

      recalculateCloneState(lib);
      return lib;

    function recalculateCloneState(lib) {
      lib.words.forEach((word, index) => {
        const id = word.id;
        const manualFocus = word.manualFocus ?? null;
        const manualStubborn = word.manualStubborn ?? null;
        const originalNo = word.originalNo;
        Object.assign(word, makeWord(word.word, word.meaning, Number.isFinite(word.index) ? word.index : index));
        word.id = id;
        word.originalNo = originalNo ?? (Number.isFinite(word.index) ? word.index + 1 : index + 1);
        word.manualFocus = manualFocus;
        word.manualStubborn = manualStubborn;
        applyWrongFlags(word);
      });
      lib.dailyRecords
        .slice()
        .sort((a, b) => Number(a.dayNumber) - Number(b.dayNumber))
        .forEach(record => updateWordStatsFromRecord(lib, record));
    }

    function buildStrictManualTask(useSelection) {
      const lib = getCurrentLibrary();
      const dayNumber = Number(document.getElementById("strictDay").value || 1);
      const stateBefore = getLibraryStateBeforeDay(dayNumber);
      let newIds = [];
      if (useSelection) {
        newIds = Array.from(document.querySelectorAll("[data-strict-new]:checked")).map(input => input.dataset.strictNew);
      } else {
        const rangeText = document.getElementById("strictRange").value.trim();
        const match = rangeText.match(/^(\d+)\s*[-–]\s*(\d+)$/);
        if (!match) {
          alert("请输入类似 1-30 的范围，或使用任意勾选。");
          return;
        }
        const start = Math.max(1, Number(match[1]));
        const end = Math.min(lib.words.length, Number(match[2]));
        newIds = lib.words.filter(word => word.index + 1 >= start && word.index + 1 <= end).map(word => word.id);
      }
      const pendingIds = getPendingWrongWords(stateBefore).map(word => word.id);
      const dueIds = getDueDelayedReviewWords(dayNumber, stateBefore).map(word => word.id);
      const taskIds = Array.from(new Set([...pendingIds, ...dueIds, ...newIds]));
      const sourceMap = {};
      pendingIds.forEach(id => sourceMap[id] = [...(sourceMap[id] || []), "wrong"]);
      dueIds.forEach(id => sourceMap[id] = [...(sourceMap[id] || []), "review"]);
      newIds.forEach(id => sourceMap[id] = [...(sourceMap[id] || []), "new"]);
      manualStrictTask = {
        dayNumber,
        taskWordIds: orderTaskIds(taskIds, lib),
        newWordIds: newIds,
        pendingWrongWordIds: pendingIds,
        delayedReviewWordIds: dueIds,
        postponedReviewWordIds: [],
        sourceMap,
        plannedNewCount: newIds.length,
        actualNewCount: newIds.length
      };
      document.getElementById("strictTaskArea").innerHTML = renderStrictTaskArea(lib, manualStrictTask);
      bindStrictSubmit();
    }

    function getRecordSources(record, id) {

      if ((record.newWordIds || []).includes(id)) sources.push("new");
      if ((record.pendingWrongWordIds || []).includes(id)) sources.push("wrong");
      if ((record.delayedReviewWordIds || []).includes(id)) sources.push("review");
      return sources.length ? sources : ["new"];
    }

    function countIntersection(idsA, idsB) {
      const setB = new Set(idsB || []);
      return Array.from(new Set(idsA || [])).filter(id => setB.has(id)).length;
    }

    function getRecordWrongStats(record) {
      const wrongIds = record.wrongWordIds || [];
      return {
        newWrong: countIntersection(wrongIds, record.newWordIds || []),
        pendingWrong: countIntersection(wrongIds, record.pendingWrongWordIds || [])
      };
    }

      input.value = "";
