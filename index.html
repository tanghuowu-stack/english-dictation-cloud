    function downloadJson(content, filename) {
      const blob = new Blob([content], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename.replace(/[\\/:*?"<>|]/g, "_");
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return '"' + text.replaceAll('"', '""') + '"';
    }

    function rowsToCsv(rows) {
      return rows.map(row => row.map(csvCell).join(",")).join("\r\n");
    }

    function downloadCsv(rows, filename) {
      const content = "\ufeff" + rowsToCsv(rows);
      const blob = new Blob([content], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename.replace(/[\\/:*?"<>|]/g, "_");
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getSourceText(sourceMap, id) {
      const sources = sourceMap?.[id] || [];
      if (sources.length > 1) return "多重来源";
      return SOURCE_LABELS[sources[0]] || "";
    }

    function requireExcelJs() {
      if (!window.ExcelJS) {
        alert("Excel 导出组件未加载，请检查网络或本地依赖。");
        return null;
      }
      return window.ExcelJS;
    }

    function excelThinBorder() {
      return {
        top: { style: "thin" },
        left: { style: "thin" },
        bottom: { style: "thin" },
        right: { style: "thin" }
      };
    }

    function safeSheetName(name) {
      const text = String(name || "Sheet1").replace(/[\\/?*:[\]]/g, "-").slice(0, 31);
      return text || "Sheet1";
    }

    async function downloadWorkbook(workbook, filename) {
      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename.replace(/[\\/:*?"<>|]/g, "_");
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getWordSourcesForTask(task, wordId) {
      const sources = [];
      if ((task?.newWordIds || []).includes(wordId)) sources.push("new");
      if ((task?.pendingWrongWordIds || []).includes(wordId)) sources.push("wrong");
      if ((task?.delayedReviewWordIds || []).includes(wordId)) sources.push("review");
      if ((task?.wrongReviewWordIds || []).includes(wordId)) sources.push("review");
      if (!sources.length && task?.sourceMap?.[wordId]) {
        task.sourceMap[wordId].forEach(source => {
          if (!sources.includes(source)) sources.push(source);
        });
      }
      return sources;
    }

    function getWordSourceLabelForTask(task, wordId) {
      const sources = getWordSourcesForTask(task, wordId);
      if (sources.length > 1) return "多重来源";
      return SOURCE_LABELS[sources[0]] || "未知来源";
    }

    function getWordSourceLabelForRecord(record, wordId) {
      const sources = [];
      if ((record.newWordIds || []).includes(wordId)) sources.push("new");
      if ((record.pendingWrongWordIds || []).includes(wordId)) sources.push("wrong");
      if ((record.delayedReviewWordIds || []).includes(wordId)) sources.push("review");
      if ((record.wrongReviewWordIds || []).includes(wordId)) sources.push("review");
      if (!sources.length && record.sourceMap?.[wordId]) {
        record.sourceMap[wordId].forEach(source => {
          if (!sources.includes(source)) sources.push(source);
        });
      }
      if (sources.length > 1) return "多重来源";
      return SOURCE_LABELS[sources[0]] || "未知来源";
    }

    function getWrongWordsForRecord(lib, record) {
      return Array.from(new Set(record?.wrongWordIds || [])).map(wordId => {
        const word = getWordById(lib, wordId);
        return {
          wordId,
          originalNo: getWordOriginalNo(word, word?.index || 0),
          entryText: word?.word || wordId,
          meaning: word?.meaning || "",
          sourceLabel: getWordSourceLabelForRecord(record, wordId),
          wrongCount: word?.wrongCount || 0,
          dayNumber: record.dayNumber,
          date: getRecordDate(record)
        };
      });
    }

    function exportWrongWordsCsv(lib, record, emptyMessage = "该记录没有错词可导出。") {
      exportWrongWordsXlsx(lib, record, emptyMessage);

    function getDictationDataRowHeight(rowsPerColumn) {
      if (rowsPerColumn >= 30) return 28;
      if (rowsPerColumn >= 27) return 31;
      if (rowsPerColumn >= 24) return 34;
      if (rowsPerColumn >= 21) return 38;
      if (rowsPerColumn >= 18) return 43;
      if (rowsPerColumn >= 15) return 50;
      return 56;
    }

    function getDictationFontSize(rowsPerColumn) {
      if (rowsPerColumn >= 30) return 11;
      if (rowsPerColumn >= 25) return 12;
      if (rowsPerColumn >= 21) return 13;
      return 14;
    }

    function getDictationLineFontSize(rowsPerColumn) {
      if (rowsPerColumn >= 30) return 7;
      if (rowsPerColumn >= 25) return 8;
      return 9;
    }

    function setupDictationPaperSheet(sheet, title, rowsPerColumn) {
      const widths = [5.2, 13, 26, 17.5, 5.2, 13, 26, 17.5];
      const dataRowHeight = getDictationDataRowHeight(rowsPerColumn);
      const finalRow = 4 + rowsPerColumn;
      sheet.columns = widths.map(width => ({ width }));
      sheet.pageSetup = {
        paperSize: 9,
        orientation: "portrait",
        fitToPage: true,
        fitToWidth: 1,
        fitToHeight: 1,
        horizontalCentered: true,
        verticalCentered: false,
        printArea: "A1:H" + finalRow,
        margins: {
          left: 0.35,
          right: 0.35,
          top: 0.35,
          bottom: 0.24,
          header: 0.2,
          footer: 0.2
        }
      };
      sheet.mergeCells("A1:H1");
      sheet.getCell("A1").value = title;
      sheet.getCell("A1").font = { name: "SimSun", size: 20, bold: true };
      sheet.getCell("A1").alignment = { horizontal: "center", vertical: "middle" };
      sheet.getRow(1).height = 25;
      sheet.getRow(2).height = 10;
      sheet.getRow(3).height = 6;
      sheet.getRow(4).height = rowsPerColumn >= 30 ? 34 : 38;

      const headers = ["原序号", "中文", "英文", "订错", "原序号", "中文", "英文", "订错"];
      headers.forEach((value, index) => {
        sheet.getCell(4, index + 1).value = value;
      });
      for (let col = 1; col <= 8; col += 1) {
        const cell = sheet.getCell(4, col);
        cell.font = { name: "SimSun", size: col === 1 || col === 5 ? 10 : 11, bold: true };
        cell.alignment = { horizontal: "center", vertical: "middle", wrapText: true };
        cell.border = excelThinBorder();
      }
      for (let rowIndex = 5; rowIndex <= finalRow; rowIndex += 1) {
        sheet.getRow(rowIndex).height = dataRowHeight;
        for (let col = 1; col <= 8; col += 1) {
          const cell = sheet.getCell(rowIndex, col);
          cell.border = excelThinBorder();
          cell.alignment = { horizontal: "center", vertical: "middle", wrapText: true };
        }
      }
    }

    function getDictationLineText(kind) {
      const englishLine = "—  —  —  —  —  —  —  —\n—  —  —  —  —  —  —  —";
      const correctionLine = "—  —  —  —  —  —\n—  —  —  —  —  —";
      return kind === "correction" ? correctionLine : englishLine;
    }

    function fillDictationPaperWord(sheet, rowIndex, startCol, word, rowsPerColumn) {
      const fontSize = getDictationFontSize(rowsPerColumn);
      const lineFontSize = getDictationLineFontSize(rowsPerColumn);
      const noCell = sheet.getCell(rowIndex, startCol);
      const meaningCell = sheet.getCell(rowIndex, startCol + 1);
      const englishLineCell = sheet.getCell(rowIndex, startCol + 2);
      const correctionLineCell = sheet.getCell(rowIndex, startCol + 3);
      noCell.value = getWordOriginalNo(word, word?.index || 0);
      meaningCell.value = word?.meaning || "";
      englishLineCell.value = getDictationLineText("english");
      correctionLineCell.value = getDictationLineText("correction");

      noCell.font = { name: "SimSun", size: fontSize };
      meaningCell.font = { name: "SimSun", size: fontSize, bold: true };
      [englishLineCell, correctionLineCell].forEach(cell => {
        cell.font = { name: "SimSun", size: lineFontSize, color: { argb: "FFD9D9D9" } };
      });
      [noCell, meaningCell, englishLineCell, correctionLineCell].forEach(cell => {
        cell.alignment = { horizontal: "center", vertical: "middle", wrapText: true };
        cell.border = excelThinBorder();
      });
    }

    async function exportDictationPaperXlsx(lib, task) {
      if (!task || !task.taskWordIds?.length) {
        alert("请先生成今日听写任务，再导出听写纸。");
        return;
      }
      const ExcelJS = requireExcelJs();
      if (!ExcelJS) return;
      ensureOriginalNos(lib);
      const exportDate = document.getElementById("taskDateInput")?.value || task.date || todayDate();
      const workbook = new ExcelJS.Workbook();
      workbook.creator = "家庭英语单词听写";
      workbook.created = new Date();
      const ids = uniqueWordIds(task.taskWordIds);
      if (ids.length > 60) {
        alert("听写纸最多支持一页 60 个词，请先减少今日听写数量后再导出。");
        return;
      }
      const rowsPerColumn = Math.ceil(ids.length / 2);
      const title = "错词练习（FCE 听力词汇）";
      const sheet = workbook.addWorksheet(safeSheetName("听写纸"));
      setupDictationPaperSheet(sheet, title, rowsPerColumn);
      ids.forEach((id, index) => {
        const word = getWordById(lib, id);
        const isRightColumn = index >= rowsPerColumn;
        const rowIndex = 5 + (isRightColumn ? index - rowsPerColumn : index);
        const startCol = isRightColumn ? 5 : 1;
        fillDictationPaperWord(sheet, rowIndex, startCol, word, rowsPerColumn);
      });
      await downloadWorkbook(workbook, "听写纸-Day" + task.dayNumber + "-" + exportDate + ".xlsx");
    }

    function exportTaskToCsv(lib, task) {
      exportDictationPaperXlsx(lib, task);
    }

    function exportWrongWordsToCsv(lib, words, label) {
      if (!words.length) {
        alert("当前筛选下没有可导出的错词。");
        return;
      }
      const rows = [[
        "原序号", "中文释义", "英文", "来源", "累计错误次数"
      ]];
      words.forEach((word, index) => {
        rows.push([
          getWordOriginalNo(word, index),
          word.meaning || "",
          word.word,
          word.isPendingWrong ? "错词复习" : "历史错词",
          word.wrongCount || 0
        ]);
      });
      downloadCsv(rows, lib.libraryName + "_" + label + "_错词.csv");
    }

    function renderSettings() {
      const lib = getCurrentLibrary();
      const s = lib.settings;
      document.getElementById("app").innerHTML = `
        <div class="grid">
          <section class="card span-12">
            <div class="row between">
              <div>
                <h2>设置</h2>
                <div class="small muted">这些设置只影响当前词库。当天新词数只控制每天新释放的新词；当天到期复查数只控制每天从到期错词复查队列中取出的词。一次就写对的词不会进入 15 天复查；只有曾经错过并写对退出错题池的词，才会在设定天数后复查。</div>
              </div>
            </div>
          </section>
          <section class="card span-12">
            <h3>学习计划</h3>
            <div class="grid">
              ${numberField("dailyTargetWords", "当天新词数", s.dailyTargetWords ?? 30, 0, 100, 5)}
              ${numberField("dailyReviewWords", "当天到期复查数", s.dailyReviewWords ?? 30, 0, 100, 5)}
              ${numberField("reviewDelayDays", "延迟复查天数", s.reviewDelayDays, 1, 365)}
              <label class="span-4 checkbox-row" style="align-self:end">
                <input data-setting="pauseNewWords" type="checkbox" ${s.pauseNewWords ? "checked" : ""}>
                暂停新词
              </label>
            </div>
          </section>
          <section class="card span-12">
            <h3>播放设置</h3>
            <div class="grid">
              <label class="span-4">播放顺序
                <select data-setting="playOrder">
                  <option value="ordered"${s.playOrder === "ordered" ? " selected" : ""}>按导入顺序</option>
                  <option value="random"${s.playOrder === "random" ? " selected" : ""}>随机</option>
                </select>
              </label>
              ${numberField("autoPlayIntervalSeconds", "自动播放间隔秒数", s.autoPlayIntervalSeconds, 1, 60)}
              ${numberField("autoPlayRepeatTimes", "自动播放每词次数", s.autoPlayRepeatTimes || 1, 1, 10)}
              <label class="span-4">朗读语速：<span id="settingsSpeechRateText">${Number(s.speechRate || 0.9).toFixed(1)}x</span>
                <input data-setting="speechRate" id="settingsSpeechRate" type="range" min="0.5" max="1.5" step="0.1" value="${escapeHtml(s.speechRate || 0.9)}">
              </label>
              <label class="span-4">朗读声音
                <select data-setting="speechVoiceName" data-speech-voice-select>
                  ${getSpeechVoiceOptionsHtml(s.speechVoiceName || "")}
                </select>
              </label>
            </div>
          </section>
          <section class="card span-12">
            <h3>错词规则</h3>
            <div class="grid">
              ${numberField("correctTimesToExitWrongPool", "错词写对几次移出错词池", s.correctTimesToExitWrongPool, 1, 10)}
            </div>
            <div class="row mobile-full" style="margin-top:14px">
              <button id="saveSettingsBtn">保存设置</button>
              <button class="ghost" id="testSpeechBtn">测试朗读</button>
            </div>
          </section>
        </div>
      `;
      document.getElementById("saveSettingsBtn").onclick = () => {
        const updates = {};
        document.querySelectorAll("[data-setting]").forEach(input => {
          const key = input.dataset.setting;
          if (input.type === "checkbox") updates[key] = input.checked;
          else if (["playOrder", "speechVoiceName"].includes(key)) updates[key] = input.value;
          else updates[key] = Number(input.value);
        });
        if ("dailyTargetWords" in updates) {
          updates.dailyTargetWords = clampNumber(updates.dailyTargetWords, 0, 100, 30);
        }
        if ("dailyReviewWords" in updates) {
          updates.dailyReviewWords = clampNumber(updates.dailyReviewWords, 0, 100, 30);
        }
        updates.countMode = "split-new-review";
        updateLibrarySettings(updates);
        alert("设置已保存。");
      };
      document.getElementById("testSpeechBtn").onclick = () => speakWord("achievement");
      const settingsRate = document.getElementById("settingsSpeechRate");
      const settingsRateText = document.getElementById("settingsSpeechRateText");
      if (settingsRate && settingsRateText) {
        settingsRate.oninput = () => settingsRateText.textContent = Number(settingsRate.value).toFixed(1) + "x";
      }
      hydrateSpeechVoiceSelects();
    }

    function numberField(key, labelText, value, min, max, step = 1) {
      return `
        <label class="span-4">${labelText}
          <input data-setting="${key}" type="number" min="${min}" max="${max}" step="${step}" value="${escapeHtml(value)}">
        </label>
      `;
    }

    window.addEventListener("beforeunload", () => saveData());
    window.addEventListener("keydown", event => {
      if (isTypingTarget(event.target)) return;
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        playAdjacentFromKeyboard(-1);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        playAdjacentFromKeyboard(1);
      }
    });
    if ("speechSynthesis" in window) {
      refreshSpeechVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        refreshSpeechVoices();
        hydrateSpeechVoiceSelects();
      };
    }
    loadData();
    renderApp();
  </script>
</body>
</html>
